<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>UMM Alumni Tracking | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-800 flex">

    <!-- LOGIN SECTION -->
    <div id="loginPage" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
            <h2 class="text-2xl font-black mb-6 text-blue-600 uppercase">Admin Access</h2>
            <div class="space-y-4">
                <input type="text" id="uInp" placeholder="Username" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <input type="password" id="pInp" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <button onclick="doLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">Login Sistem</button>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <main id="mainContent" class="hidden flex-1 p-8 md:p-12 overflow-y-auto">
        <header class="flex justify-between items-start mb-10">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">UMM Alumni Tracking</h1>
                <p class="text-slate-500 mt-1">Sistem Pemetaan Karir Lulusan Terintegrasi.</p>
            </div>
            <button onclick="location.reload()" class="bg-white border px-6 py-2 rounded-xl text-sm font-bold shadow-sm hover:bg-slate-50">Logout</button>
        </header>

        <!-- STATS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-white p-7 rounded-[2rem] border-t-4 border-blue-500 shadow-sm">
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Total Alumni</p>
                <h3 id="s-total" class="text-3xl font-black">0</h3>
            </div>
            <div class="bg-white p-7 rounded-[2rem] border-t-4 border-emerald-500 shadow-sm">
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Terverifikasi</p>
                <h3 id="s-lacak" class="text-3xl font-black text-emerald-600">0</h3>
            </div>
            <div class="bg-white p-7 rounded-[2rem] border-t-4 border-orange-500 shadow-sm">
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Belum Tervalidasi</p>
                <h3 id="s-belum" class="text-3xl font-black text-orange-500">0</h3>
            </div>
        </div>

        <!-- SEARCH & TABLE -->
        <section class="bg-white rounded-[2.5rem] shadow-sm border p-8">
            <div class="flex gap-4 mb-8">
                <input type="text" id="search" placeholder="Cari Nama atau NIM..." class="flex-1 p-5 bg-slate-50 border rounded-2xl outline-none focus:ring-4 focus:ring-blue-100">
                <button onclick="currPage=1; doSearch()" class="bg-blue-600 text-white px-10 rounded-2xl font-bold shadow-lg hover:bg-blue-700">Cari Alumni</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-[10px] text-slate-400 font-black border-b uppercase">
                        <tr>
                            <th class="p-4">Nama Lulusan</th>
                            <th class="p-4">NIM</th>
                            <th class="p-4">Program Studi</th>
                            <th class="p-4 text-center">Tahun Masuk</th>
                            <th class="p-4">Tanggal Lulus</th>
                            <th class="p-4">Status</th>
                            <th class="p-4 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-xs divide-y"></tbody>
                </table>
            </div>

            <!-- PAGINATION -->
            <div class="flex justify-between items-center mt-10 bg-slate-50 p-5 rounded-3xl">
                <p class="text-slate-400 text-[10px] font-black tracking-widest uppercase">Halaman <span id="pgCur">1</span> / <span id="pgTotal">1</span></p>
                <div class="flex gap-2">
                    <button onclick="changePg(-1)" class="px-5 py-2 bg-white border border-slate-200 rounded-xl font-bold text-xs hover:bg-slate-100 transition">PREV</button>
                    <button onclick="changePg(1)" class="px-5 py-2 bg-blue-600 text-white rounded-xl font-bold text-xs hover:bg-blue-700 transition">NEXT PAGE</button>
                </div>
            </div>
        </section>
    </main>

    <!-- MODAL DETAIL -->
    <div id="detailModal" class="fixed inset-0 bg-slate-900/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-4xl max-h-[85vh] overflow-hidden rounded-[2.5rem] shadow-2xl flex flex-col">
            <div class="p-8 border-b flex justify-between items-center bg-slate-50/50">
                <h2 id="detNama" class="text-3xl font-black text-slate-900 leading-none"></h2>
                <button onclick="closeDet()" class="text-2xl hover:text-red-500">✕</button>
            </div>
            <div class="p-8 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-4" id="detFields"></div>
        </div>
    </div>

    <script>
        // OTOMATIS SESUAI LINK HOSTING
        const API = window.location.origin + "/api";
        let currPage = 1;
        let memData = [];

        async function doLogin() {
            const u = document.getElementById('uInp').value;
            const p = document.getElementById('pInp').value;
            try {
                const res = await fetch(`${API}/login`, { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({username:u, password:p})
                });
                
                if(res.ok) {
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                    loadStats(); 
                    doSearch();
                } else {
                    alert("Akses Ditolak! Periksa Username & Password.");
                }
            } catch (err) {
                console.error(err);
                alert("Gagal terhubung ke server.");
            }
        }

        async function loadStats() {
            const res = await fetch(`${API}/stats`);
            const d = await res.json();
            document.getElementById('s-total').innerText = d.total.toLocaleString();
            document.getElementById('s-lacak').innerText = d.verified.toLocaleString();
            document.getElementById('s-belum').innerText = d.pending.toLocaleString();
        }

        async function doSearch() {
            const q = document.getElementById('search').value;
            const res = await fetch(`${API}/search?q=${q}&page=${currPage}`);
            const result = await res.json();
            memData = result.data;
            document.getElementById('pgCur').innerText = result.currentPage;
            document.getElementById('pgTotal').innerText = result.totalPage;

            document.getElementById('tableBody').innerHTML = memData.map((i, idx) => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-4 font-bold text-slate-900">${i['Nama Lulusan']}</td>
                    <td class="p-4 text-slate-500">${i['NIM']}</td>
                    <td class="p-4 text-slate-500">${i['Program Studi']}</td>
                    <td class="p-4 text-center text-slate-400 font-bold">${i['Tahun Masuk']}</td>
                    <td class="p-4 text-slate-400">${i['Tanggal Lulus']}</td>
                    <td class="p-4">
                        <span class="${i.is_verified ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'} px-3 py-1 rounded-full font-black uppercase text-[8px]">
                            ${i.is_verified ? 'Verified' : 'Raw'}
                        </span>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="openDet(${idx})" class="text-blue-600 font-black text-[10px] bg-blue-50 px-3 py-1.5 rounded-xl hover:bg-blue-600 hover:text-white transition uppercase tracking-tighter">Preview</button>
                    </td>
                </tr>
            `).join('');
        }

        function changePg(step) { currPage += step; if(currPage < 1) currPage = 1; doSearch(); }

        function openDet(idx) {
            const item = memData[idx];
            document.getElementById('detNama').innerText = item['Nama Lulusan'];
            
            document.getElementById('detFields').innerHTML = Object.entries(item).filter(([k])=>k!=='is_verified').map(([k,v])=>{
                let displayValue = v || '-';
                if ((k === 'Linkedin' || k === 'Sosial Media Kantor' || k.includes('IG')) && v && v !== '-') {
                    displayValue = `<a href="${v}" target="_blank" class="text-blue-600 underline break-all hover:text-blue-800 transition">${v}</a>`;
                }
                return `
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-[9px] text-slate-400 font-black uppercase mb-1">${k}</p>
                        <p class="font-bold text-sm text-slate-700 break-words">${displayValue}</p>
                    </div>
                `;
            }).join('');
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeDet() { document.getElementById('detailModal').classList.add('hidden'); }
    </script>
</body>
</html>
